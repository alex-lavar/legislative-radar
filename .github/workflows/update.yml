name: Update Data + Deploy

on:
  # Run every night at 2am ET (7am UTC)
  schedule:
    - cron: '0 7 * * *'

  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

  # Also deploy when you push code changes to main
  push:
    branches: [main]

permissions:
  contents: write        # needed to commit bills.json back to repo
  pages: write           # needed to deploy to GitHub Pages
  id-token: write        # needed for Pages OIDC auth

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data update script
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-data.js
        # Don't fail the whole deploy if the data update fails
        # (e.g., API is down) — we'll still deploy with existing data
        continue-on-error: true

      - name: Commit updated bills.json if changed
        run: |
          git config user.name "Legislative Radar Bot"
          git config user.email "actions@github.com"
          git add data/bills.json
          git diff --staged --quiet || git commit -m "chore: update bills data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
        continue-on-error: true

      - name: Build React app
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
